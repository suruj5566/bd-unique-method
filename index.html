<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Management Platform</title>
    <style>
        /* ===== গ্লোবাল স্টাইল ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            transition: all 0.3s ease;
        }

        /* ===== হেডার ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .header h1 {
            font-size: 20px;
            color: #333;
            font-weight: 700;
        }

        .balance {
            background: #4CAF50;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        /* ===== মেনু ===== */
        .menu {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 12px;
        }

        .menu-item {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
            min-width: 60px;
        }

        .menu-item:hover {
            background: #e9ecef;
        }

        .menu-item.active {
            background: #667eea;
            color: white;
        }

        /* ===== নম্বর ডিসপ্লে ===== */
        .number-display {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
        }

        .number-display .label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .number-display .number {
            font-size: 32px;
            font-weight: 700;
            color: #2d3436;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
        }

        .number-display .order-id {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
        }

        /* ===== বাটন ===== */
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(86, 171, 47, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(235, 51, 73, 0.4);
        }

        /* ===== লোডিং ===== */
        #loading {
            display: none;
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 15px 0;
            color: #667eea;
            font-weight: 500;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== রেজাল্ট বক্স ===== */
        #result {
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border: 2px solid #e9ecef;
            min-height: 80px;
            transition: all 0.3s;
            background: #fafafa;
        }

        #result.info {
            border-color: #667eea;
            background: #f0f0ff;
        }

        #result.success {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        #result.error {
            border-color: #f44336;
            background: #ffebee;
        }

        #result.warning {
            border-color: #ff9800;
            background: #fff3e0;
        }

        #result .icon {
            font-size: 24px;
            margin-right: 10px;
        }

        #result .message {
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
        }

        #result .timestamp {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            display: block;
        }

        /* ===== অ্যাকশন লগ ===== */
        .action-log {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
            color: #666;
            max-height: 150px;
            overflow-y: auto;
        }

        .action-log .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .action-log .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: #999;
            margin-right: 10px;
        }

        /* ===== রেস্পন্সিভ ===== */
        @media (max-width: 600px) {
            .app-container {
                padding: 20px;
            }

            .number-display .number {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            .menu-item {
                font-size: 12px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- ===== হেডার ===== -->
    <div class="header">
        <h1>📱 OTP Platform</h1>
        <span class="balance">💰 $0.000</span>
    </div>

    <!-- ===== মেনু ===== -->
    <div class="menu">
        <div class="menu-item active">📊 Dashboard</div>
        <div class="menu-item" id="getNumberMenu">📞 Get Number</div>
        <div class="menu-item">🔄 Live Console</div>
        <div class="menu-item">👤 Profile</div>
        <div class="menu-item">💳 Payment</div>
    </div>

    <!-- ===== নম্বর ডিসপ্লে ===== -->
    <div class="number-display">
        <div class="label">📞 আপনার বর্তমান নম্বর</div>
        <div class="number" id="displayNumber">4473845XXX</div>
        <div class="order-id">🆔 Order ID: <span id="orderId">অনলাইনে</span></div>
    </div>

    <!-- ===== বাটন গ্রুপ ===== -->
    <div class="button-group">
        <button class="btn btn-primary" id="getNumberBtn">
            📥 Get Number
        </button>
        <button class="btn btn-success" id="checkOtpBtn" disabled>
            🔍 Check OTP
        </button>
        <button class="btn btn-danger" id="clearBtn">
            🗑️ Clear
        </button>
    </div>

    <!-- ===== লোডিং ===== -->
    <div id="loading">
        <span class="spinner"></span>
        লোড হচ্ছে, দয়া করে অপেক্ষা করুন...
    </div>

    <!-- ===== রেজাল্ট ===== -->
    <div id="result">
        <span class="icon">💡</span>
        <span class="message">এখানে নম্বর বা OTP দেখাবে</span>
        <span class="timestamp" id="timestamp"></span>
    </div>

    <!-- ===== অ্যাকশন লগ ===== -->
    <div class="action-log" id="actionLog">
        <div class="log-entry">
            <span class="log-time">🟢</span>
            সিস্টেম রেডি - OTP ম্যানেজমেন্ট চালু আছে
        </div>
    </div>
</div>

<script>
    // ==========================================
    //  সম্পূর্ণ JavaScript লজিক (Supabase API সহ)
    // ==========================================

    // 📌 DOM রেফারেন্স
    const displayNumber = document.getElementById('displayNumber');
    const orderId = document.getElementById('orderId');
    const getNumberBtn = document.getElementById('getNumberBtn');
    const checkOtpBtn = document.getElementById('checkOtpBtn');
    const clearBtn = document.getElementById('clearBtn');
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');
    const resultMessage = resultDiv.querySelector('.message');
    const resultIcon = resultDiv.querySelector('.icon');
    const timestamp = document.getElementById('timestamp');
    const actionLog = document.getElementById('actionLog');

    // 📌 স্টেট ভেরিয়েবল
    let currentNumber = '4473845XXX';
    let currentOrderId = 'অনলাইনে';
    let currentOtp = null;
    let isProcessing = false;

    // ==========================================
    //  🔥 কনফিগারেশন (আপনার দেওয়া API সহ)
    // ==========================================
    const CONFIG = {
        // এখানে আপনার দেওয়া API URL যোগ করা হয়েছে
        API_URL: window.location.origin + '/api/get-otp',
        API_TOKEN: '',
        TEST_MODE: false // 👈 false করে দেওয়া হয়েছে (আসল API ব্যবহার করবে)
    };

    // ==========================================
    //  ইউটিলিটি ফাংশন
    // ==========================================

    // লগ এন্ট্রি যোগ করা
    function addLog(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const time = new Date().toLocaleTimeString();
        const emoji = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
        entry.innerHTML = `<span class="log-time">${emoji} ${time}</span> ${message}`;
        actionLog.prepend(entry);
        
        // বেশি হলে ডিলিট
        while (actionLog.children.length > 50) {
            actionLog.removeChild(actionLog.lastChild);
        }
    }

    // রেজাল্ট আপডেট করা
    function setResult(message, type = 'info', icon = '💡') {
        resultDiv.className = type;
        resultIcon.textContent = icon;
        resultMessage.textContent = message;
        timestamp.textContent = new Date().toLocaleString();
    }

    // লোডিং শো/হাইড
    function setLoading(show) {
        loading.style.display = show ? 'block' : 'none';
        getNumberBtn.disabled = show;
        checkOtpBtn.disabled = show || !currentOtp;
    }

    // ==========================================
    //  📞 মেইন API কল ফাংশন (Supabase API)
    // ==========================================

    async function fetchNumberAndOTP() {
        if (isProcessing) return;
        isProcessing = true;

        setLoading(true);
        setResult('⏳ সার্ভার থেকে ডেটা আনা হচ্ছে...', 'info', '⏳');
        addLog('নতুন নম্বর রিকোয়েস্ট পাঠানো হচ্ছে...', 'info');

        try {
            // 🔥 আসল API কল (Supabase)
            const response = await fetch(CONFIG.API_URL, {
                method: 'POST', // POST method ব্যবহার করছি
                headers: {
                    'Content-Type': 'application/json',
                    // যদি টোকেন লাগে:
                    // 'Authorization': `Bearer ${CONFIG.API_TOKEN}`
                },
                // কোনো body প্রয়োজন নেই, সার্ভার নিজেই জেনারেট করবে
            });

            // 📌 রেসপন্স টেক্সট হিসেবে পড়া
            const text = await response.text();

            // ❌ চেক করা HTML কিনা
            if (text.trim().startsWith('<')) {
                // HTML পেয়েছি → JSON নয় → Error
                const errorMsg = '⚠️ সার্ভার HTML রেসপন্স দিয়েছে (JSON নয়)। হয়তো সেশন শেষ বা URL ভুল।';
                setResult(errorMsg, 'error', '🚫');
                addLog('❌ HTML রেসপন্স পেয়েছি!', 'error');
                console.error('HTML রেসপন্স:', text.substring(0, 500));
                
                // ডিবাগ তথ্য দেখানো
                if (text.includes('login') || text.includes('signin')) {
                    setResult('🔐 লগইন পেজ রিটার্ন হয়েছে। দয়া করে লগইন করুন।', 'error', '🔐');
                } else if (text.includes('404')) {
                    setResult('📁 404 নট ফাউন্ড - API এন্ডপয়েন্ট ঠিক নেই।', 'error', '📁');
                } else if (text.includes('500')) {
                    setResult('⚡ সার্ভার এরর (500) - কিছুক্ষণ পরে চেষ্টা করুন।', 'error', '⚡');
                }
                
                return;
            }

            // ✅ JSON পার্স করা
            let data;
            try {
                data = JSON.parse(text);
            } catch (parseError) {
                setResult('❌ JSON পার্স করতে পারিনি। রেসপন্স ফরম্যাট ঠিক নয়।', 'error', '🚫');
                addLog(`❌ JSON পার্স এরর: ${parseError.message}`, 'error');
                console.error('পার্স এরর, রেসপন্স:', text);
                return;
            }

            // 📊 ডেটা প্রসেস করা
            console.log('📦 ডেটা:', data);

            if (!data.success) {
                setResult(`❌ সার্ভার বলছে: ${data.message || 'অজানা ত্রুটি'}`, 'error', '🚫');
                addLog(`❌ API ত্রুটি: ${data.message}`, 'error');
                return;
            }

            // ✅ নম্বর সেট করা
            if (data.number) {
                currentNumber = data.number;
                displayNumber.textContent = currentNumber;
                addLog(`📞 নতুন নম্বর: ${currentNumber}`, 'success');
            }

            // ✅ অর্ডার আইডি সেট
            if (data.orderId) {
                currentOrderId = data.orderId;
                orderId.textContent = currentOrderId;
            }

            // ✅ OTP সেট
            if (data.otp) {
                currentOtp = data.otp;
                checkOtpBtn.disabled = false;
                setResult(`✅ নতুন OTP জেনারেট হয়েছে: ${currentOtp}`, 'success', '✅');
                addLog(`🔑 OTP প্রাপ্ত: ${currentOtp}`, 'success');
            } else {
                // যদি OTP না আসে (প্রোডাকশনে)
                setResult(`📞 নম্বর পাওয়া গেছে: ${currentNumber}। OTP আপনার ফোনে পাঠানো হয়েছে।`, 'info', '📞');
                addLog('📱 OTP ফোনে পাঠানো হয়েছে', 'info');
                
                // ডেভ মোডে OTP দেখানোর জন্য
                if (data.message && data.message.includes('ডেভ')) {
                    setResult(`📞 নম্বর: ${currentNumber}\n💡 ডেভ মোড: OTP দেখুন - ${data.otp || 'OTP জেনারেট হয়েছে'}`, 'info', '💡');
                }
            }

        } catch (error) {
            // ❌ নেটওয়ার্ক বা অন্য কোন এরর
            setResult(`❌ নেটওয়ার্ক ত্রুটি: ${error.message}`, 'error', '🚫');
            addLog(`❌ এরর: ${error.message}`, 'error');
            console.error('ফুল এরর:', error);
        } finally {
            setLoading(false);
            isProcessing = false;
        }
    }

    // ==========================================
    //  🔍 OTP চেক ফাংশন
    // ==========================================

    async function checkOTP() {
        if (!currentOtp) {
            setResult('⚠️ প্রথমে "Get Number" বাটনে ক্লিক করুন।', 'warning', '⚠️');
            addLog('⚠️ OTP নেই, আগে নম্বর নিন', 'warning');
            return;
        }

        setLoading(true);
        setResult(`🔍 OTP ভেরিফাই করা হচ্ছে...`, 'info', '🔍');
        addLog(`🔍 OTP চেক করা হচ্ছে: ${currentOtp}`, 'info');

        try {
            // 🔥 OTP ভেরিফাই API কল
            const response = await fetch('/api/verify-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    phoneNumber: currentNumber,
                    otp: currentOtp
                })
            });

            const data = await response.json();
            console.log('🔍 ভেরিফাই রেসপন্স:', data);

            if (data.success) {
                setResult(`✅ OTP সঠিক! (${currentOtp})`, 'success', '✅');
                addLog(`✅ OTP ভেরিফাইড: ${currentOtp}`, 'success');
                currentOtp = null;
                checkOtpBtn.disabled = true;
            } else {
                setResult(`❌ ${data.message || 'OTP ভুল!'}`, 'error', '❌');
                addLog(`❌ OTP ভেরিফাই ব্যর্থ`, 'error');
            }

        } catch (error) {
            setResult(`❌ ভেরিফাই করতে ব্যর্থ: ${error.message}`, 'error', '🚫');
            addLog(`❌ ভেরিফাই এরর: ${error.message}`, 'error');
        } finally {
            setLoading(false);
        }
    }

    // ==========================================
    //  🗑️ ক্লিয়ার ফাংশন
    // ==========================================

    function clearAll() {
        currentOtp = null;
        checkOtpBtn.disabled = true;
        setResult('🧹 সব ক্লিয়ার করা হয়েছে। নতুন নম্বর নিন।', 'info', '🧹');
        addLog('🧹 ক্লিয়ার করা হয়েছে', 'info');
        // নম্বর কিন্তু রেখে দিচ্ছি
    }

    // ==========================================
    //  🎯 ইভেন্ট লিসেনার
    // ==========================================

    // Get Number
    getNumberBtn.addEventListener('click', fetchNumberAndOTP);

    // Check OTP
    checkOtpBtn.addEventListener('click', checkOTP);

    // Clear
    clearBtn.addEventListener('click', clearAll);

    // মেনু ক্লিক (ডেমো)
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            this.classList.add('active');
            addLog(`📂 মেনু: ${this.textContent}`, 'info');
        });
    });

    // ==========================================
    //  🚀 ইনিশিয়ালাইজ
    // ==========================================

    console.log('🚀 OTP Management Platform Started');
    console.log(`📌 API URL: ${CONFIG.API_URL}`);
    console.log(`📌 টেস্ট মোড: ${CONFIG.TEST_MODE ? 'চালু' : 'বন্ধ'}`);
    
    addLog('🚀 সিস্টেম চালু হয়েছে (Supabase API সংযুক্ত)', 'success');
    setResult('💡 "Get Number" বাটনে ক্লিক করুন নতুন নম্বর পেতে', 'info', '💡');

    // সার্ভার হেলথ চেক
    async function checkHealth() {
        try {
            const response = await fetch('/api/health');
            const data = await response.json();
            if (data.status === '🟢 OK') {
                addLog('✅ সার্ভার সংযোগ OK', 'success');
                console.log('✅ সার্ভার হেলথ:', data);
            }
        } catch (error) {
            addLog('⚠️ সার্ভার হেলথ চেক ব্যর্থ', 'error');
        }
    }
    checkHealth();

</script>

</body>
</html>
