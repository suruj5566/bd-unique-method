<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BD UNIQUE METHOD — OTP Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg-primary:#0b0f1a;--bg-card:#111827;--bg-card-hover:#1a2236;--accent-gradient:linear-gradient(135deg,#f59e0b,#fbbf24);--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#475569;--radius:16px;--radius-sm:10px}
    body{background:var(--bg-primary);color:var(--text-primary);font-family:'Inter',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 30% 20%,rgba(245,158,11,0.03),transparent 60%)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:var(--bg-primary)}
    ::-webkit-scrollbar-thumb{background:#f59e0b;border-radius:10px}
    .glass-card{background:var(--bg-card);border:1px solid rgba(245,158,11,0.06);border-radius:var(--radius);padding:1.5rem;transition:all .3s ease}
    .glass-card:hover{background:var(--bg-card-hover);border-color:rgba(245,158,11,0.12);transform:translateY(-2px)}
    .gradient-text{background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 200%;animation:shimmer 3s ease-in-out infinite}
    @keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .btn-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0b0f1a;font-weight:700;padding:12px 28px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all .25s ease;display:inline-flex;align-items:center;gap:10px}
    .btn-gold:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 0 40px -4px rgba(245,158,11,0.25)}
    .btn-outline{background:transparent;border:1.5px solid rgba(245,158,11,0.15);color:var(--text-primary);padding:12px 24px;border-radius:var(--radius-sm);cursor:pointer;transition:all .25s ease;display:inline-flex;align-items:center;gap:10px}
    .btn-outline:hover{border-color:#f59e0b;background:rgba(245,158,11,0.04)}
    .input-dark{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.04);color:var(--text-primary);padding:14px 18px;border-radius:var(--radius-sm);width:100%;transition:all .3s ease;font-size:.9rem}
    .input-dark:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 30px -8px rgba(245,158,11,0.06);background:rgba(255,255,255,0.05)}
    .input-dark::placeholder{color:var(--text-muted)}
    .number-hero{font-family:'Inter',sans-serif;font-weight:800;font-size:2.8rem;letter-spacing:2px;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;word-break:break-all}
    .stat-number{font-size:2rem;font-weight:800;color:var(--text-primary)}
    .stat-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:600}
    .otp-item{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:.8rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;transition:all .2s}
    .otp-item:hover{background:rgba(255,255,255,0.04);border-color:rgba(245,158,11,0.06)}
    .otp-code{background:rgba(245,158,11,0.06);color:#f59e0b;font-weight:700;padding:.1rem .8rem;border-radius:8px;border:1px solid rgba(245,158,11,0.06);min-width:70px;text-align:center}
    .otp-message{flex:1;font-size:.85rem;color:var(--text-secondary);min-width:120px}
    .otp-meta{font-size:.65rem;color:var(--text-muted);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
    .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 12px rgba(16,185,129,0.3);animation:pulse-dot 1.8s ease-in-out infinite}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
    @media(max-width:640px){.number-hero{font-size:2rem}.stat-number{font-size:1.5rem}.glass-card{padding:1.2rem}}
  </style>
</head>
<body>

<div class="max-w-7xl mx-auto px-4 sm:px-6 py-5 space-y-6">

  <!-- HEADER -->
  <header class="glass-card flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-black"><span class="gradient-text">BD UNIQUE METHOD</span></h1>
      <p class="text-xs text-text-muted tracking-widest uppercase font-medium">OTP Management Platform</p>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-sm text-text-muted">Balance:</span>
      <span class="text-sm font-bold text-[#f59e0b]" id="headerBalance">$0.000</span>
    </div>
  </header>

  <!-- STATS ROW -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
    <div class="glass-card"><div class="stat-label">Numbers</div><div class="stat-number" id="statNumbers">0</div></div>
    <div class="glass-card"><div class="stat-label">OTPs</div><div class="stat-number" id="statOtps">0</div></div>
    <div class="glass-card"><div class="stat-label">Success</div><div class="stat-number text-[#10b981]" id="statSuccess">0%</div></div>
    <div class="glass-card"><div class="stat-label">Earned</div><div class="stat-number text-[#f59e0b]" id="statEarned">0.000</div></div>
  </div>

  <!-- GET NUMBER PANEL -->
  <div class="glass-card">
    <h2 class="text-lg font-bold flex items-center gap-2 mb-4"><i data-feather="phone" class="text-[#f59e0b]"></i> Get Number</h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
      <input id="rangeInput" type="text" placeholder="রেঞ্জ দিন (যেমন: 4473845XXX)" class="input-dark">
      <button id="getNumberBtn" class="btn-gold justify-center"><i data-feather="refresh-cw" class="w-4 h-4"></i> Get Number</button>
      <button id="checkOtpBtn" class="btn-outline justify-center"><i data-feather="search" class="w-4 h-4"></i> Check OTP</button>
    </div>
    <div id="numberResult" class="mt-4 p-4 bg-[#0a0e1a] rounded-xl text-center">
      <p class="text-text-muted text-sm">এখানে নাম্বার দেখাবে</p>
      <div id="displayNumber" class="number-hero text-3xl mt-2">—</div>
      <p id="numberStatus" class="text-xs text-text-muted mt-1"></p>
    </div>
  </div>

  <!-- OTP LIST -->
  <div class="glass-card">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold flex items-center gap-2"><i data-feather="inbox" class="text-[#f59e0b]"></i> OTP List</h2>
      <button id="refreshOtpsBtn" class="text-text-muted hover:text-[#f59e0b] transition text-sm flex items-center gap-1">
        <i data-feather="refresh-cw" class="w-4 h-4"></i> Refresh
      </button>
    </div>
    <div id="otpContainer" class="space-y-2">
      <p class="text-text-muted text-sm text-center py-4">Loading OTPs...</p>
    </div>
  </div>

  <!-- MANUAL NUMBER -->
  <div class="glass-card">
    <h2 class="text-lg font-bold flex items-center gap-2 mb-4"><i data-feather="edit" class="text-[#f59e0b]"></i> Manual Number</h2>
    <div class="flex gap-3">
      <input id="manualNumber" type="text" placeholder="নাম্বার দিন (যেমন: 447384512345)" class="input-dark">
      <button id="manualCheckBtn" class="btn-gold"><i data-feather="check" class="w-4 h-4"></i> Check</button>
    </div>
    <div id="manualResult" class="mt-3 text-sm text-text-muted"></div>
  </div>

</div>

<script>
  const API_BASE = window.location.origin;

  // ================================================================
  //  LOAD STATS
  // ================================================================
  async function loadStats() {
    try {
      const res = await fetch(`${API_BASE}/api/stats`);
      const data = await res.json();
      if (data.success) {
        document.getElementById('statNumbers').textContent = data.allTime.numbers;
        document.getElementById('statOtps').textContent = data.allTime.otps;
        document.getElementById('statSuccess').textContent = data.allTime.success;
        document.getElementById('statEarned').textContent = data.allTime.earned;
        document.getElementById('headerBalance').textContent = '$' + data.balance.toFixed(3);
      }
    } catch (e) { console.error('Stats error:', e); }
  }

  // ================================================================
  //  GET NUMBER (FAST X OTP)
  // ================================================================
  document.getElementById('getNumberBtn').addEventListener('click', async () => {
    const range = document.getElementById('rangeInput').value.trim() || '4473845XXX';
    const display = document.getElementById('displayNumber');
    const status = document.getElementById('numberStatus');
    display.textContent = '⏳';
    status.textContent = 'নাম্বার নেওয়া হচ্ছে...';

    try {
      const res = await fetch(`${API_BASE}/api/fastx/get-number`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ range, isNational: false, removePlus: false })
      });
      const data = await res.json();
      if (data.success) {
        const num = data.number?.number || data.number?.copy || data.number?.phone || 'N/A';
        display.textContent = num;
        status.textContent = `✅ ${data.number?.country || 'Unknown'} • ${data.number?.operator || ''}`;
        loadOtps();
        loadStats();
      } else {
        display.textContent = '❌';
        status.textContent = data.message || 'ব্যর্থ!';
      }
    } catch (e) {
      display.textContent = '⚠️';
      status.textContent = 'Error: ' + e.message;
    }
  });

  // ================================================================
  //  CHECK OTP (FAST X OTP)
  // ================================================================
  document.getElementById('checkOtpBtn').addEventListener('click', async () => {
    const number = document.getElementById('rangeInput').value.trim();
    if (!number) {
      alert('দয়া করে একটি নাম্বার দিন!');
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/api/fastx/check-otp?number=${number}`);
      const data = await res.json();
      if (data.success && data.otp) {
        alert(`📱 ${data.otp.nomor}\n📊 স্ট্যাটাস: ${data.otp.status}\n🔑 OTP: ${data.otp.kode_otp || 'পাওয়া যায়নি'}`);
        loadOtps();
      } else {
        alert(data.message || 'কোনো তথ্য পাওয়া যায়নি');
      }
    } catch (e) {
      alert('Error: ' + e.message);
    }
  });

  // ================================================================
  //  LOAD OTPs
  // ================================================================
  async function loadOtps() {
    const container = document.getElementById('otpContainer');
    container.innerHTML = '<p class="text-text-muted text-sm text-center py-4">Loading...</p>';
    try {
      const res = await fetch(`${API_BASE}/api/otps`);
      const data = await res.json();
      if (data.success && data.otps.length > 0) {
        let html = '';
        data.otps.slice(0, 20).forEach(o => {
          html += `
            <div class="otp-item">
              <div class="otp-code">${o.otp || '—'}</div>
              <div class="otp-message">${o.message || o.number || 'N/A'}</div>
              <div class="otp-meta">
                <span>${o.number || ''}</span>
                <span class="text-[#f59e0b]">${o.service || 'Unknown'}</span>
                <span class="${o.status === 'success' ? 'text-[#10b981]' : 'text-yellow-400'}">${o.status || ''}</span>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      } else {
        container.innerHTML = '<p class="text-text-muted text-sm text-center py-4">কোনো OTP পাওয়া যায়নি</p>';
      }
    } catch (e) {
      container.innerHTML = '<p class="text-red-400 text-sm text-center py-4">Error loading OTPs</p>';
    }
  }

  // ================================================================
  //  MANUAL CHECK
  // ================================================================
  document.getElementById('manualCheckBtn').addEventListener('click', async () => {
    const number = document.getElementById('manualNumber').value.trim();
    const result = document.getElementById('manualResult');
    if (!number) {
      result.innerHTML = '<span class="text-red-400">দয়া করে একটি নাম্বার দিন!</span>';
      return;
    }
    result.innerHTML = '⏳ Searching...';
    try {
      const res = await fetch(`${API_BASE}/api/fastx/check-otp?number=${number}`);
      const data = await res.json();
      if (data.success && data.otp) {
        result.innerHTML = `
          <span class="text-[#10b981]">✅ নম্বর: ${data.otp.nomor}</span><br>
          <span>📊 স্ট্যাটাস: ${data.otp.status}</span><br>
          <span class="text-[#f59e0b]">🔑 OTP: ${data.otp.kode_otp || 'পাওয়া যায়নি'}</span>
        `;
        loadOtps();
      } else {
        result.innerHTML = `<span class="text-red-400">${data.message || 'কোনো তথ্য পাওয়া যায়নি'}</span>`;
      }
    } catch (e) {
      result.innerHTML = `<span class="text-red-400">Error: ${e.message}</span>`;
    }
  });

  // ================================================================
  //  REFRESH
  // ================================================================
  document.getElementById('refreshOtpsBtn').addEventListener('click', loadOtps);

  // ================================================================
  //  INIT
  // ================================================================
  document.addEventListener('DOMContentLoaded', () => {
    feather.replace();
    loadStats();
    loadOtps();
    setInterval(loadStats, 30000);
    setInterval(loadOtps, 15000);
  });
</script>

</body>
</html>
